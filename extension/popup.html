<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAYBACK Coupon Activator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #003087;
      color: #fff;
      width: 240px;
      padding: 20px;
      text-align: center;
    }

    h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    p.subtitle {
      font-size: 11px;
      opacity: 0.75;
      margin-bottom: 16px;
    }

    button#activate {
      background: #FFD700;
      color: #003087;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background 0.15s;
    }

    button#activate:hover { background: #FFC200; }
    button#activate:disabled { background: #ccc; color: #666; cursor: default; }

    #status {
      margin-top: 12px;
      font-size: 12px;
      min-height: 18px;
      opacity: 0.9;
    }

    #status.error { color: #ff8080; }
    #status.success { color: #80ff99; }
  </style>
</head>
<body>
  <h1>PAYBACK Coupon Activator</h1>
  <p class="subtitle">Alle Coupons mit einem Klick aktivieren</p>

  <button id="activate">🎟️ Alle aktivieren</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
